<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>양액기 뷰어 문의 · 건의</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
  :root{ --ink:#1f2937; --green-dark:#1a4731; --green-mid:#2d7a4f; --green-pale:#e8f5ee; --line:#cfd6dd; --gray:#6b7280; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{ font-family:'Noto Sans KR','Malgun Gothic',sans-serif; color:var(--ink); background:#eef1f4; font-size:15px; line-height:1.7; }
  .sheet{ max-width:560px; margin:30px auto; background:#fff; padding:32px 28px; border-radius:14px; box-shadow:0 2px 14px rgba(0,0,0,.08); }
  .top{ text-align:center; border-bottom:3px solid var(--green-dark); padding-bottom:14px; margin-bottom:18px; }
  .brand{ color:var(--green-mid); font-weight:800; font-size:12px; letter-spacing:1px; }
  h1{ font-size:22px; font-weight:900; margin:6px 0 2px; }
  .sub{ font-size:13px; color:var(--gray); }
  label{ display:block; font-weight:700; font-size:14px; margin:16px 0 6px; }
  textarea, input{ width:100%; font-family:inherit; font-size:15px; padding:11px 13px; border:1px solid var(--line); border-radius:8px; color:var(--ink); }
  textarea{ resize:vertical; min-height:140px; }
  textarea:focus, input:focus{ outline:none; border-color:var(--green-mid); }
  .send{ width:100%; margin-top:18px; padding:13px; font-family:inherit; font-size:16px; font-weight:700; color:#fff; background:var(--green-mid); border:none; border-radius:9px; cursor:pointer; }
  .send:hover{ background:var(--green-dark); }
  .note{ font-size:12px; color:var(--gray); margin-top:12px; text-align:center; }
  .ok{ background:var(--green-pale); border:1px solid #bfe3cf; border-radius:10px; padding:22px; text-align:center; }
  .ok h2{ color:var(--green-dark); font-size:19px; margin-bottom:6px; }
  .hide{ display:none; }
</style>
</head>
<body>
<div class="sheet">
  <div class="top">
    <div class="brand">㈜우성하이텍 · 양액기 뷰어</div>
    <h1>문의 · 건의</h1>
    <div class="sub">사용 중 불편한 점이나 개선 의견을 보내주세요.</div>
  </div>

  <!-- 전송 완료 화면 -->
  <div id="done" class="ok hide">
    <h2>✔ 전송되었습니다</h2>
    <div>소중한 의견 감사합니다. 담당자가 확인 후 연락드리겠습니다.</div>
  </div>

  <!-- 문의 폼 (정식 폼 제출 → Formsubmit) -->
  <form id="form" action="https://formsubmit.co/phg@wsh.co.kr" method="POST">
    <input type="hidden" name="_subject" id="f_subject" value="[양액기 뷰어 문의]">
    <input type="hidden" name="_template" value="table">
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_next" id="f_next" value="">
    <input type="hidden" name="농가" id="f_farm" value="">

    <label for="content">문의 / 건의 내용</label>
    <textarea name="내용" id="content" placeholder="내용을 입력하세요" required></textarea>

    <label for="contact">회신 받을 연락처 · 이메일 (선택)</label>
    <input name="연락처" id="contact" placeholder="휴대전화 또는 이메일" autocomplete="off">

    <button type="submit" class="send">✉️ 보내기</button>
    <div class="note">㈜우성하이텍 담당자에게 전달됩니다.</div>
  </form>
</div>

<script>
  // 농가 식별: 뷰어가 ?farm=<주소> 로 열어줌 → 제목/본문에 포함
  (function(){
    var params = new URLSearchParams(location.search);
    var farm = params.get('farm') || '';
    if(farm){
      document.getElementById('f_subject').value = '[양액기 뷰어 문의] ' + farm;
      document.getElementById('f_farm').value = farm;
    }
    // 전송 후 이 페이지로 복귀(?sent=1) → 완료 화면
    document.getElementById('f_next').value = location.href.split('#')[0].split('?')[0] + '?sent=1' + (farm ? '&farm=' + encodeURIComponent(farm) : '');
    if(/[?&]sent=1/.test(location.search)){
      document.getElementById('form').classList.add('hide');
      document.getElementById('done').classList.remove('hide');
    }
  })();
</script>
</body>
</html>
